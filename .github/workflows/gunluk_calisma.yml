name: Minerva Günlük Güncelleme

on:
  schedule:
    - cron: '0 17 * * 1-5'  # Her hafta içi 17:00 UTC = 20:00 Türkiye
  workflow_dispatch:          # Manuel çalıştırma butonu

jobs:
  guncelle-ve-analiz:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install psycopg2-binary yfinance pandas numpy

      - name: Adj Close güncelle ve Z-Score hesapla
        env:
          EXT_DB_HOST: ${{ secrets.EXT_DB_HOST }}
          EXT_DB_PORT: ${{ secrets.EXT_DB_PORT }}
          EXT_DB_NAME: ${{ secrets.EXT_DB_NAME }}
          EXT_DB_USER: ${{ secrets.EXT_DB_USER }}
          EXT_DB_PASSWORD: ${{ secrets.EXT_DB_PASSWORD }}
        run: python minerva_guncelle.py

      - name: Anomali tespiti
        env:
          EXT_DB_HOST: ${{ secrets.EXT_DB_HOST }}
          EXT_DB_PORT: ${{ secrets.EXT_DB_PORT }}
          EXT_DB_NAME: ${{ secrets.EXT_DB_NAME }}
          EXT_DB_USER: ${{ secrets.EXT_DB_USER }}
          EXT_DB_PASSWORD: ${{ secrets.EXT_DB_PASSWORD }}
        run: python anomali_tespit_ext.py
