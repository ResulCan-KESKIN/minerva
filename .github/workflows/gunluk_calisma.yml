name: Minerva Günlük Veri ve Anomali

on:
  schedule:
    - cron: '0 17 * * 1-5'  # Her hafta içi 17:00 UTC = 20:00 Türkiye
  workflow_dispatch:          # Manuel çalıştırma butonu

jobs:
  veri-cek-ve-analiz:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install psycopg2-binary yfinance pandas scikit-learn

      - name: Veri çek
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python veri_cek.py

      - name: Anomali tespiti
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python anomali_tespit.py